<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <style>
      @keyframes neon-pulse {
        0%, 100% { opacity: 0.6; filter: drop-shadow(0 0 1px #EF4444); }
        50% { opacity: 1; filter: drop-shadow(0 0 4px #EF4444); }
      }
      @keyframes float-head {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-1px) rotate(15deg); }
      }
      .glow-slash {
        animation: neon-pulse 1.8s ease-in-out infinite;
      }
      .severed-head {
        transform-origin: 35px 27px;
        animation: float-head 2.5s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Dark Background Plate -->
  <circle cx="24" cy="24" r="23" fill="#0B0C10" stroke="#1F2833" stroke-width="1" />

  <!-- Stick Figure Executioner (Left) -->
  <g>
    <!-- Legs -->
    <path d="M 12 35 L 16 27 L 20 35" stroke="#EDE8DF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Torso -->
    <path d="M 16 27 L 18 19" stroke="#EDE8DF" stroke-width="2.2" stroke-linecap="round" fill="none" />
    <!-- Head -->
    <circle cx="19.5" cy="14.5" r="2.5" fill="#EDE8DF" />
    <!-- Arm swinging -->
    <path d="M 18 19 L 24 18" stroke="#EDE8DF" stroke-width="2.2" stroke-linecap="round" fill="none" />
  </g>

  <!-- Red Glowing Sword Swing / Slash -->
  <path d="M 21 16 Q 28 19 34 22" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" fill="none" class="glow-slash" />

  <!-- Stick Figure Victim (Right) -->
  <g>
    <!-- Kneeling Legs -->
    <path d="M 26 35 C 26 31 29 28 29 28 L 33 32" stroke="#EDE8DF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Slumped Torso -->
    <path d="M 29 28 L 31 24" stroke="#EDE8DF" stroke-width="2.2" stroke-linecap="round" fill="none" />
    <!-- Severed Head (Detached and floating/rolling) -->
    <circle cx="35" cy="27" r="2.5" fill="#EF4444" class="severed-head" />
  </g>

  <!-- Seedhe Maut acronym at the bottom -->
  <text x="24" y="42" font-family="'Space Mono', monospace" font-size="5" fill="#EF4444" font-weight="700" text-anchor="middle" letter-spacing="1.5" class="glow-slash">TBSM</text>
</svg>